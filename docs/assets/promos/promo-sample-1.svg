<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.55" stop-color="#0a1a3a"/>
      <stop offset="1" stop-color="#001b2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#00A8FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00A8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amount" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#00A8FF" stroke-opacity="0.08" stroke-width="1">
    <path d="M0 125 H800 M0 250 H800 M0 375 H800"/>
    <path d="M160 0 V500 M320 0 V500 M480 0 V500 M640 0 V500"/>
  </g>

  <!-- neon frame -->
  <rect x="22" y="22" width="756" height="456" rx="22" fill="none" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="2" filter="url(#soft)"/>

  <!-- badge -->
  <g transform="translate(60,70)">
    <rect width="186" height="40" rx="20" fill="#FF8C00" fill-opacity="0.14" stroke="#FF8C00" stroke-opacity="0.5"/>
    <text x="93" y="26" text-anchor="middle" fill="#FF8C00" font-size="17" font-weight="700" letter-spacing="1">LIMITED PROMO</text>
  </g>

  <!-- headline -->
  <text x="60" y="240" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="1">SAVE UP TO</text>
  <text x="58" y="350" fill="url(#amount)" font-size="150" font-weight="900" filter="url(#soft)">&#8369;500</text>
  <text x="63" y="405" fill="#cfe6ff" font-size="34" font-weight="600">OFF Selected Smartphones</text>

  <!-- phone glyph -->
  <g transform="translate(610,150)" opacity="0.95">
    <rect x="0" y="0" width="120" height="220" rx="22" fill="#0a1124" stroke="#00D9FF" stroke-opacity="0.6" stroke-width="2"/>
    <rect x="40" y="12" width="40" height="9" rx="4" fill="#00A8FF" fill-opacity="0.5"/>
    <rect x="16" y="34" width="88" height="150" rx="8" fill="#00A8FF" fill-opacity="0.12"/>
    <text x="60" y="130" text-anchor="middle" font-size="54">&#128241;</text>
  </g>

  <!-- brand -->
  <text x="60" y="452" fill="#9fb3d1" font-size="20" font-weight="700" letter-spacing="2">D&amp;G TECH &amp; LOAD</text>
  <text x="765" y="452" text-anchor="end" fill="#00D9FF" font-size="16" font-weight="600">Message us to avail</text>
</svg>
